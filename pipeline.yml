trigger: none

name: storage-migration_$(Date:yyyyMMdd)$(Rev:.r)

variables:
  # Dev env variables - update as needed per stage and container changes
  # TODO: Consider parameterizing in future 
  serviceConnection: 'FT-DairyNet-Cloud-PROD-001-CICD'
  sourceSubscriptionId: '3cd7b099-993c-4d72-bc13-1408376a88a6'
  sourceStorageAccount: 'dncstorage33cdprd'
  sourceContainer: 'dnc-dataexplorer-prd'
  destSubscriptionId: '1dc32f4d-fc9d-4077-a568-777d2ccfcdb2'
  destStorageAccount: 'stdncstorage3ok0r'
  destContainer: 'data-migration-trial-prd'

pool:
  name: caf-pool-ftdairynetcloudpro1dc3

stages:
  - stage: StorageMigration
    displayName: 'Container Storage Migration'
    jobs:
      - job: MigrationPlan
        displayName: 'Inventory & Preview'
        workspace:
          clean: all
        steps:
          - checkout: self

          - template: ../migrations/storage/install-migration-tools.yml

          # Preview migration with -WhatIf
          - task: AzurePowerShell@5
            displayName: 'Preview Storage Migration (-WhatIf)'
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: FilePath
              ScriptPath: migrations/storage/storage-migration.ps1
              ScriptArguments: >-
                -SourceSubscriptionId '$(sourceSubscriptionId)'
                -SourceStorageAccount '$(sourceStorageAccount)'
                -SourceContainer '$(sourceContainer)'
                -DestSubscriptionId '$(destSubscriptionId)'
                -DestStorageAccount '$(destStorageAccount)'
                -DestContainer '$(destContainer)'
                -WhatIf
              azurePowerShellVersion: LatestVersion
              pwsh: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish migration plan'
            condition: always()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/migration-plan'
              artifact: 'migration-plan'

      - job: ManualApproval
        displayName: 'Approve Plan'
        dependsOn: MigrationPlan
        pool: server
        steps:
          - task: ManualValidation@1
            inputs:
              notifyUsers: ''
              instructions: 'Review the migration plan and approve to proceed with the migration.'
              onTimeout: 'reject'
              timeout: '1440' # 1 day

      - job: MigrateStorageContainer
        displayName: 'Migrate Storage Container'
        dependsOn: ManualApproval
        workspace:
          clean: all
        steps:
          - checkout: self

          - template: ../migrations/storage/install-migration-tools.yml

          # Execute migration
          - task: AzurePowerShell@5
            displayName: 'Execute Storage Migration'
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: FilePath
              ScriptPath: migrations/storage/storage-migration.ps1
              ScriptArguments: >-
                -SourceSubscriptionId '$(sourceSubscriptionId)'
                -SourceStorageAccount '$(sourceStorageAccount)'
                -SourceContainer '$(sourceContainer)'
                -DestSubscriptionId '$(destSubscriptionId)'
                -DestStorageAccount '$(destStorageAccount)'
                -DestContainer '$(destContainer)'
              azurePowerShellVersion: LatestVersion
              pwsh: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish azcopy logs'
            condition: always()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/azcopy-logs'
              artifact: 'azcopy-logs'
