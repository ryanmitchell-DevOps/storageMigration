trigger: none

name: storage-migration_$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: maxFilesPerRun
    displayName: 'Max files to copy per run (0 = no limit / copy everything; e.g. 25000 to chunk a huge container -- re-run until done)'
    type: number
    default: 0

  - name: copyEntireContainer
    displayName: 'First run into an EMPTY destination: copy the whole container (skips the merge-join scan; no validation). Re-run with this OFF afterwards to reconcile & validate.'
    type: boolean
    default: false

variables:


pool:
  name: 

stages:
  - stage: StorageMigration
    displayName: 'Container Storage Migration'
    jobs:
      - job: MigrationPlan
        displayName: 'Inventory & Preview'
        timeoutInMinutes: 240   # 4h cap; merge-join plans large containers in minutes
        workspace:
          clean: all
        steps:
          - checkout: self

          - template: ../migrations/storage/install-migration-tools.yml

          # Preview migration with -WhatIf
          - task: AzurePowerShell@5
            displayName: 'Preview Storage Migration (-WhatIf)'
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: FilePath
              ScriptPath: migrations/storage/storage-migration.ps1
              ScriptArguments: >-
                -SourceSubscriptionId '$(sourceSubscriptionId)'
                -SourceStorageAccount '$(sourceStorageAccount)'
                -SourceContainer '$(sourceContainer)'
                -DestSubscriptionId '$(destSubscriptionId)'
                -DestStorageAccount '$(destStorageAccount)'
                -DestContainer '$(destContainer)'
                -MaxFilesPerRun ${{ parameters.maxFilesPerRun }}
                -CopyEntireContainer:$${{ parameters.copyEntireContainer }}
                -WhatIf
              azurePowerShellVersion: LatestVersion
              pwsh: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish migration plan'
            # Fast path writes no plan -- only publish in normal (merge-join) mode.
            condition: and(always(), eq('${{ parameters.copyEntireContainer }}', 'False'))
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/migration-plan'
              artifact: 'migration-plan'

      - job: ManualApproval
        displayName: 'Approve Plan'
        dependsOn: MigrationPlan
        pool: server
        steps:
          - task: ManualValidation@1
            inputs:
              notifyUsers: ''
              instructions: 'Review the migration plan and approve to proceed with the migration.'
              onTimeout: 'reject'
              timeout: '1440' # 1 day

      - job: MigrateStorageContainer
        displayName: 'Migrate Storage Container'
        timeoutInMinutes: 1440  # 24h cap; the 900k server-to-server copy can run for hours
        dependsOn: ManualApproval
        workspace:
          clean: all
        steps:
          - checkout: self

          - template: ../migrations/storage/install-migration-tools.yml

          # Execute migration
          - task: AzurePowerShell@5
            displayName: 'Execute Storage Migration'
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: FilePath
              ScriptPath: migrations/storage/storage-migration.ps1
              ScriptArguments: >-
                -SourceSubscriptionId '$(sourceSubscriptionId)'
                -SourceStorageAccount '$(sourceStorageAccount)'
                -SourceContainer '$(sourceContainer)'
                -DestSubscriptionId '$(destSubscriptionId)'
                -DestStorageAccount '$(destStorageAccount)'
                -DestContainer '$(destContainer)'
                -MaxFilesPerRun ${{ parameters.maxFilesPerRun }}
                -CopyEntireContainer:$${{ parameters.copyEntireContainer }}
              azurePowerShellVersion: LatestVersion
              pwsh: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish azcopy logs'
            condition: always()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/azcopy-logs'
              artifact: 'azcopy-logs'
