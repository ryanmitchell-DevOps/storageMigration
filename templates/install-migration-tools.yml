# Installs the tooling the migration script needs on a clean self-hosted agent:
# PowerShell 7, the Az modules, and AzCopy. Each agent job runs on its own fresh
# agent, so this must be included in every job that runs storage-migration.ps1.
steps:
  - bash: |
      curl -sSL https://github.com/PowerShell/PowerShell/releases/download/v7.4.2/powershell-7.4.2-linux-x64.tar.gz -o /tmp/powershell.tar.gz
      mkdir -p ~/.local/powershell
      tar zxf /tmp/powershell.tar.gz -C ~/.local/powershell
      echo "##vso[task.prependpath]$HOME/.local/powershell"
      ~/.local/powershell/pwsh --version
    displayName: 'Install PowerShell'

  - bash: |
      export PATH="$HOME/.local/powershell:$PATH"
      pwsh -Command "Install-Module Az.Accounts -Force -Scope CurrentUser; Install-Module Az.Storage -Force -Scope CurrentUser -MinimumVersion 6.0.0; Install-Module Az.Resources -Force -Scope CurrentUser"
    displayName: 'Install Az PowerShell modules'

  - bash: |
      curl -sSL https://aka.ms/downloadazcopy-v10-linux -o /tmp/azcopy.tar.gz
      mkdir -p ~/.local/azcopy
      tar zxf /tmp/azcopy.tar.gz -C ~/.local/azcopy --strip-components=1
      echo "##vso[task.prependpath]$HOME/.local/azcopy"
      ~/.local/azcopy/azcopy --version
    displayName: 'Install AzCopy'
