trigger: none

variables:
  serviceConnection: ''
  destSubscriptionId: ''
  destStorageAccount: ''
  destContainer: ''

name: storage-cleanup_$(Date:yyyyMMdd)$(Rev:.r)

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Preview files being cleaned in from trial container
    displayName: 'Preview destination contents (no deletion)'
    jobs:
      - job: Clean up Preview
        displayName: 'Inventory destination container'
        workspace:
          clean: all
        steps:
          - checkout: self

          - task: AzurePowerShell@5
            displayName: 'Inventory destination (-WhatIf, read-only)'
            inputs:
              azureSubscription: $(serviceConnection)
              ScriptType: FilePath
              ScriptPath: scripts/clear-destination-container.ps1
              ScriptArguments: >-
                -SubscriptionId '$(destSubscriptionId)'
                -StorageAccount '$(destStorageAccount)'
                -Container '$(destContainer)'
                -WhatIf
              azurePowerShellVersion: LatestVersion
              pwsh: true

  - stage: Delete
    displayName: 'Delete destination contents (requires approval)'
    dependsOn: Preview
    condition: succeeded()
    jobs:
      - deployment: Delete
        displayName: 'Clear destination container'
        environment: 'storage-cleanup-approval'
        workspace:
          clean: all
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzurePowerShell@5
                  displayName: 'Clear destination container'
                  inputs:
                    azureSubscription: $(serviceConnection)
                    ScriptType: FilePath
                    ScriptPath: scripts/clear-destination-container.ps1
                    ScriptArguments: >-
                      -SubscriptionId '$(destSubscriptionId)'
                      -StorageAccount '$(destStorageAccount)'
                      -Container '$(destContainer)'
                    azurePowerShellVersion: LatestVersion
                    pwsh: true

                - task: PublishPipelineArtifact@1
                  displayName: 'Publish azcopy logs'
                  condition: always()
                  inputs:
                    targetPath: '$(Build.ArtifactStagingDirectory)/azcopy-logs'
                    artifact: 'azcopy-cleanup-logs'
